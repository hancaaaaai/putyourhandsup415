<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的專屬手語拍貼</title>
    <style>
        body { margin: 0; background: #f4f4f4; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
        .v-card { width: 90%; max-width: 400px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        video { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        
        /* 修改按鈕樣式以適應 button 標籤 */
        .dl-btn { 
            background: #00EAFF; color: white; padding: 15px 30px; 
            border-radius: 50px; text-decoration: none; font-weight: bold; 
            display: inline-block; border: none; cursor: pointer; 
            font-size: 1.1rem; width: 80%; transition: 0.3s;
        }
        .dl-btn:disabled { background: #ccc; cursor: not-allowed; }
        .dl-btn:active { transform: scale(0.95); }
        
        .hint-text { font-size: 0.85rem; color: #888; line-height: 1.5; margin-bottom: 20px; font-weight: bold;}
        .highlight { color: #FF3B30; }
    </style>
</head>
<body>
    <div class="v-card">
        <h2 style="color: #4A4A4A;">🎉 拍貼完成！</h2>
        
        <video id="player" controls autoplay loop muted playsinline></video>
        
        <p class="hint-text">
            💡 【iPhone 最快儲存法】<br>
            直接<span class="highlight">長按上方影片 2 秒</span>，選擇「儲存影片」<br>即可直接存入照片相簿中！
        </p>

        <button id="downloadBtn" class="dl-btn">📥 下載影片 (存入檔案)</button>
    </div>

    <script>
        const videoUrl = new URLSearchParams(window.location.search).get('video');
        
        if(videoUrl) {
            // 1. 正常播放影片
            document.getElementById('player').src = videoUrl;
            
            // 2. 終極 Blob 破解下載法
            document.getElementById('downloadBtn').addEventListener('click', async function() {
                const btn = this;
                const originalText = btn.innerText;
                
                // 顯示讀取中，避免重複點擊
                btn.innerText = '⏳ 影片處理中...';
                btn.disabled = true;

                try {
                    // 👉 魔法 1：在背景把雲端影片抓下來變成手機的資料 (Blob)
                    const response = await fetch(videoUrl);
                    const blob = await response.blob();
                    
                    // 👉 魔法 2：把這包資料變成手機「本機端」的專屬網址
                    const blobUrl = window.URL.createObjectURL(blob);
                    
                    // 👉 魔法 3：做一個隱形的按鈕，觸發本機下載，蘋果就會放行了！
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = blobUrl;
                    a.download = '我的手語拍貼.mp4'; // 強制給定檔名
                    
                    document.body.appendChild(a);
                    a.click();
                    
                    // 清除產生出來的垃圾網址
                    window.URL.revokeObjectURL(blobUrl);
                    document.body.removeChild(a);
                    
                    btn.innerText = '✅ 下載成功！';
                } catch (error) {
                    console.error('下載失敗', error);
                    alert('下載失敗，請嘗試直接「長按影片」儲存喔！');
                } finally {
                    // 3 秒後把按鈕恢復原狀
                    setTimeout(() => {
                        btn.innerText = originalText;
                        btn.disabled = false;
                    }, 3000);
                }
            });
        }
    </script>
</body>
</html>
