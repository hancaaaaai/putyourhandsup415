<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手語拍貼機</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body class="booth-page">

    <video id="webcam-video" autoplay playsinline muted></video>

    <div id="ui-layer" class="booth-ui-layer">
        
        <div id="detection-modal" class="booth-modal-overlay">
            <div class="booth-modal-content">
                <img src="PNG/拍貼_手掌偵測.png" class="modal-bg-img" alt="手部偵測">
                
                <div class="interactive-area">
                    <div id="scanner-box" class="scanner-box state-no-hand">
                        <svg class="scanner-svg" width="140" height="140">
                            <path class="corner-brackets" 
                                  d="M 40,10 H 30 A 20,20 0 0 0 10,30 V 40 M 10,100 V 110 A 20,20 0 0 0 30,130 H 40 M 100,130 H 110 A 20,20 0 0 0 130,110 V 100 M 130,40 V 30 A 20,20 0 0 0 110,10 H 100" 
                                  stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" fill="none" />
                            <path class="progress-ring-rect" 
                                  d="M 70,10 h 40 a 20,20 0 0 1 20,20 v 80 a 20,20 0 0 1 -20,20 h -80 a 20,20 0 0 1 -20,-20 v -80 a 20,20 0 0 1 20,-20 Z" 
                                  stroke="#00EAFF" stroke-width="6" stroke-linecap="round" fill="none" />
                        </svg>
                        
                        <img src="PNG/封面_揮手.png" alt="揮手" id="wobble-hand" class="wobble-hand-icon">
                    </div>
                    <p class="status-text" id="status-text">請舉起手</p>
                </div>
            </div>
        </div>
<div id="teaching-ui" class="teaching-overlay" style="display: none;">
            
            <video id="tutorial-video" class="tutorial-video" autoplay loop muted playsinline></video>
            
            <div id="target-trackers-container"></div>

            <h2 id="role-display-text" class="role-display-text">
                <span id="trait-text">淘 氣</span>
                <span id="gender-text" class="text-grey">女</span>
            </h2>

            <div id="hint-pill" class="hint-pill">手放胸前，手心向內上下擺動，並且靈動你的手指</div>

            <div id="rec-indicator" class="rec-indicator" style="display: none;">
                <span class="rec-dot"></span> REC
            </div>

        </div>

    <script src="booth.js"></script>
</body>
</html>
